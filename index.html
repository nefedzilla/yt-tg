<style>
:root{--bg:#0f0f0f;--elev:#212121;--text:#f1f1f1;--muted:#aaa;--accent:#ff0000;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:Roboto,Arial,system-ui,sans-serif;padding-bottom:66px;}

.search button{padding:0 18px;border:1px solid #303030;border-radius:0 20px 20px 0;background:#222;color:#fff;cursor:pointer;font-size:15px;}
.gear{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px;}
.suggest{position:absolute;top:100%;left:0;right:0;background:#212121;border:1px solid #303030;border-top:none;border-radius:0 0 12px 12px;max-height:60vh;overflow-y:auto;display:none;z-index:50;}

.chhead{padding:14px 12px 2px;font-size:20px;font-weight:700;}

.cav{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:#333;object-fit:cover;}
.title{font-size:14px;font-weight:500;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.channel{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}

.chav{width:48px;height:48px;border-radius:50%;object-fit:cover;background:#333;flex-shrink:0;}
.chname{font-size:15px;font-weight:500;}
.loader{text-align:center;padding:30px;color:var(--muted);grid-column:1/-1;}
.libnav{display:flex;gap:10px;padding:14px 12px;}

.libsec h3{font-size:15px;font-weight:600;margin:14px 12px 0;}
.watch{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;overflow-y:auto;animation:slideUp .22s ease;}
.ministrip{display:none;align-items:center;justify-content:space-between;background:#000;padding:4px 8px;}
.ministrip button{background:none;border:none;color:#fff;font-size:14px;cursor:pointer;}
.wbar{display:flex;align-items:center;gap:12px;padding:10px 12px;position:sticky;top:0;background:var(--bg);z-index:2;}

.resume{position:absolute;left:12px;bottom:12px;z-index:6;background:rgba(0,0,0,.85);color:#fff;padding:8px 12px;border-radius:6px;font-size:13px;cursor:pointer;display:none;}

.wtitle{font-size:16px;font-weight:600;line-height:1.35;}

.qsel{border:1px solid #333;}
#wlBtn.on{background:#fff;color:#0f0f0f;}
.sbnote{margin-top:12px;font-size:12px;color:#3ea6ff;min-height:16px;}
.desc{font-size:13px;color:#ddd;white-space:pre-wrap;margin-top:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.desc.open{-webkit-line-clamp:unset;overflow:visible;}
.descmore{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:6px 0;display:none;}
.cbtn{margin-top:14px;background:#272727;color:#fff;border:none;border-radius:18px;padding:9px 16px;font-size:13px;cursor:pointer;}
.csecttl{font-size:15px;font-weight:600;margin:14px 0 6px;}

.cav2{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:#333;}

.relttl{grid-column:1/-1;font-size:15px;font-weight:600;padding:6px 2px 0;}
.shorts{position:fixed;inset:0;background:#000;z-index:110;display:none;flex-direction:column;animation:fadeIn .2s ease;}
.shortsFeed{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;}
.short{height:100%;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000;}
.shortHolder{width:100%;height:100%;}
.shortHolder iframe{width:100%;height:100%;border:none;}
.shortThumb{width:100%;height:100%;object-fit:contain;background:#000;}
.shortInfo{position:absolute;left:12px;bottom:20px;right:12px;color:#fff;text-shadow:0 1px 4px #000;pointer-events:none;}
.shortTitle{font-weight:600;font-size:15px;}
.shortCh{font-size:13px;opacity:.9;margin-top:4px;}
.settings{position:fixed;inset:0;background:var(--bg);z-index:120;display:none;flex-direction:column;overflow-y:auto;animation:slideUp .22s ease;}
.setttl{font-size:16px;font-weight:600;}
.setbody{padding:8px 14px;}
.setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 2px;border-bottom:1px solid #222;font-size:14px;}
.setrow select{background:#222;color:#fff;border:1px solid #333;border-radius:6px;padding:6px;font-size:13px;}
.setrow input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent);}
.sethint{color:var(--muted);font-size:12px;padding:12px 2px;}
.tabbar{position:fixed;left:0;right:0;bottom:0;height:58px;background:#0f0f0f;border-top:1px solid #272727;display:flex;z-index:90;}
.tabitem{flex:1;background:none;border:none;color:var(--muted);font-size:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;}
.tabitem .ic{font-size:19px;}
.tabitem.active{color:#fff;}
.watch.mini{inset:auto;bottom:70px;right:8px;width:230px;height:auto;border-radius:12px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.7);animation:none;}
.watch.mini .wbar,.watch.mini .wmeta,.watch.mini #related{display:none;}
.watch.mini .ministrip{display:flex;}
.watch.mini .tapzone{display:none;}
</style>
</head>

function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}

// ---------- helpers ----------
function show(el){el.style.display='block';} function hide(el){el.style.display='none';}

function fmtViews(n){n=+n||0;if(n>=1e9)return (n/1e9).toFixed(1)+' млрд';if(n>=1e6)return (n/1e6).toFixed(1)+' млн';if(n>=1e3)return Math.round(n/1e3)+' тыс.';return ''+n;}
function parseDur(iso){if(!iso)return 0;const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);if(!m)return 0;return (+(m[1]||0))*3600+(+(m[2]||0))*60+(+(m[3]||0));}
function fmtClock(sec){sec=Math.floor(sec);const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60,p=x=>(''+x).padStart(2,'0');return h?h+':'+p(m)+':'+p(s):m+':'+p(s);}
function fmtDur(iso){const s=parseDur(iso);return s?fmtClock(s):'';}
function fmtAgo(s){const sec=(Date.now()-new Date(s).getTime())/1000;if(sec<3600)return Math.max(1,Math.floor(sec/60))+' мин назад';if(sec<86400)return Math.floor(sec/3600)+' ч назад';const d=Math.floor(sec/86400);if(d<30)return d+' дн назад';const mo=Math.floor(d/30);if(mo<12)return mo+' мес назад';return Math.floor(d/365)+' г назад';}

async function fetchJson(url,opts){const r=await fetch(url,opts);const d=await r.json();if(d.error)throw d.error;return d;}

async function fetchCached(url,ttl){const now=Date.now();if(memCache[url]&&now-memCache[url].t<ttl)return memCache[url].d;try{const raw=sessionStorage.getItem('c:'+url);if(raw){const o=JSON.parse(raw);if(now-o.t<ttl){memCache[url]=o;return o.d;}}}catch(e){}const d=await fetchJson(url);memCache[url]={t:now,d:d};try{sessionStorage.setItem('c:'+url,JSON.stringify({t:now,d:d}));}catch(e){}return d;}
function showErr(err){let msg=(err&&err.message)?err.message:String(err);const reason=err&&err.errors&&err.errors[0]&&err.errors[0].reason;if(reason==='quotaExceeded'||/quota/i.test(msg))msg='Превышен дневной лимит YouTube API. Попробуй позже (лимит сбрасывается раз в сутки).';else if(/act on behalf/i.test(msg))msg='У этого Google-аккаунта нет YouTube-канала, либо подписки на бренд-аккаунте.';if(list.querySelector('.card')){console.warn(msg);return;}list.innerHTML='<div class="loader">Ошибка: '+esc(msg)+'</div>';}

// ---------- cards ----------
function cardHtml(v){const durSec=parseDur(v.contentDetails&&v.contentDetails.duration),dur=durSec?fmtClock(durSec):'';const views=v.statistics&&v.statistics.viewCount?fmtViews(v.statistics.viewCount)+' просмотров':'';const ago=v.snippet.publishedAt?fmtAgo(v.snippet.publishedAt):'';const th=v.snippet.thumbnails.high||v.snippet.thumbnails.medium||v.snippet.thumbnails.default;const cid=v.snippet.channelId||'';let prog='';if(resume[v.id]&&durSec>0){const p=Math.min(100,Math.round(resume[v.id]/durSec*100));if(p>2)prog='<div class="prog"><i style="width:'+p+'%"></i></div>';}const av=chAvatars[cid]||'';const meta=[views,ago].filter(Boolean).join(' • ');return '<div class="card" data-id="'+v.id+'" data-cid="'+esc(cid)+'" data-title="'+esc(v.snippet.title)+'" data-channel="'+esc(v.snippet.channelTitle)+'"><div class="thumbwrap"><img class="thumb" src="'+(th?th.url:'')+'" loading="lazy"/>'+(dur?'<span class="dur">'+dur+'</span>':'')+prog+'</div><div class="info"><img class="cav" data-cid="'+esc(cid)+'" src="'+av+'" '+(av?'':'style="visibility:hidden"')+'/><div><div class="title">'+esc(v.snippet.title)+'</div><div class="channel">'+esc(v.snippet.channelTitle)+(meta?'<br>'+meta:'')+'</div></div></div></div>';}
function histCard(x){const th=YT_IMG+x.id+'/mqdefault.jpg';const av=chAvatars[x.ch]||'';return '<div class="card" data-id="'+x.id+'" data-cid="'+esc(x.ch)+'" data-title="'+esc(x.t)+'" data-channel="'+esc(x.c)+'"><div class="thumbwrap"><img class="thumb" src="'+th+'" loading="lazy"/></div><div class="info"><img class="cav" data-cid="'+esc(x.ch)+'" src="'+av+'" '+(av?'':'style="visibility:hidden"')+'/><div><div class="title">'+esc(x.t)+'</div><div class="channel">'+esc(x.c)+'</div></div></div></div>';}
function appendVideos(items){list.insertAdjacentHTML('beforeend',(items||[]).map(cardHtml).join(''));fillAvatars();}
async function fillAvatars(){const need=[];document.querySelectorAll('.cav[data-cid]').forEach(el=>{const c=el.dataset.cid;if(c&&!chAvatars[c]&&need.indexOf(c)<0)need.push(c);});for(let i=0;i<need.length;i+=50){const batch=need.slice(i,i+50);try{const d=await fetchCached(API+"/channels?part=snippet&id="+batch.join(",")+"&key="+API_KEY,3600000);(d.items||[]).forEach(c=>{const t=c.snippet.thumbnails&&(c.snippet.thumbnails.default||c.snippet.thumbnails.medium);chAvatars[c.id]=t?t.url:'';});}catch(e){}}try{sessionStorage.setItem('avatars',JSON.stringify(chAvatars));}catch(e){}document.querySelectorAll('.cav[data-cid]').forEach(el=>{const u=chAvatars[el.dataset.cid];if(u){el.src=u;el.style.visibility='visible';}});}

// ---------- views ----------
async function loadHome(reset){if(reset){view={type:'home'};pageToken='';endReached=false;setNav('home');setListGrid(true);viewHeader.innerHTML='';list.innerHTML='';}if(endReached||loadingMore)return;loadingMore=true;show(loader);try{const d=await fetchCached(API+"/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=20&regionCode="+REGION+(pageToken?"&pageToken="+pageToken:"")+"&key="+API_KEY,600000);appendVideos(d.items);pageToken=d.nextPageToken||'';if(!pageToken)endReached=true;}catch(e){showErr(e);}loadingMore=false;hide(loader);}
async function runSearch(q,reset){if(reset){view={type:'search',q:q};pageToken='';endReached=false;setNav('');setListGrid(true);viewHeader.innerHTML='';list.innerHTML='';}if(endReached||loadingMore)return;loadingMore=true;show(loader);try{const d=await fetchCached(API+"/search?part=snippet&type=video&maxResults=20&q="+encodeURIComponent(view.q)+(pageToken?"&pageToken="+pageToken:"")+"&key="+API_KEY,300000);pageToken=d.nextPageToken||'';if(!pageToken)endReached=true;const ids=d.items.map(i=>i.id.videoId).filter(Boolean).join(",");if(ids){const d2=await fetchCached(API+"/videos?part=snippet,statistics,contentDetails&id="+ids+"&key="+API_KEY,300000);appendVideos(d2.items);}else if(reset)list.innerHTML='<div class="loader">Ничего не найдено</div>';}catch(e){showErr(e);}loadingMore=false;hide(loader);}
async function loadChannel(cid,title,reset){view={type:'channel',cid:cid,title:title,auth:false,plId:null};setNav('');setListGrid(true);viewHeader.innerHTML='<div class="chhead">'+esc(title||'Канал')+'</div>';list.innerHTML='';window.scrollTo(0,0);show(loader);await renderChannelHeader(cid,title);hide(loader);pageToken='';endReached=false;if(view.plId)loadPlaylistPage(true);else list.innerHTML='<div class="loader">Не удалось загрузить канал</div>';}
async function renderChannelHeader(cid,title){try{const d=await fetchCached(API+"/channels?part=snippet,statistics,brandingSettings,contentDetails&id="+cid+"&key="+API_KEY,3600000);const c=d.items&&d.items[0];if(!c)return;view.plId=c.contentDetails.relatedPlaylists.uploads;const banner=c.brandingSettings&&c.brandingSettings.image&&c.brandingSettings.image.bannerExternalUrl;const av=c.snippet.thumbnails&&(c.snippet.thumbnails.medium||c.snippet.thumbnails.default);const subs=c.statistics&&c.statistics.subscriberCount?fmtViews(c.statistics.subscriberCount)+' подписчиков':'';viewHeader.innerHTML='<div class="chpage">'+(banner?'<img class="chbanner" src="'+banner+'=w1200"/>':'')+'<div class="chpageinfo"><img class="chpageav" src="'+(av?av.url:'')+'"/><div><div class="chpagename">'+esc(c.snippet.title)+'</div><div class="chpagesub">'+subs+'</div></div></div></div>';}catch(e){}}
