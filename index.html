function appendVideos(items){list.insertAdjacentHTML('beforeend',(items||[]).map(cardHtml).join(''));fillAvatars();}
async function fillAvatars(){const need=[];document.querySelectorAll('.cav[data-cid]').forEach(el=>{const c=el.dataset.cid;if(c&&!chAvatars[c]&&need.indexOf(c)<0)need.push(c);});for(let i=0;i<need.length;i+=50){const batch=need.slice(i,i+50);try{const d=await fetchCached(API+"/channels?part=snippet&id="+batch.join(",")+"&key="+API_KEY,3600000);(d.items||[]).forEach(c=>{const t=c.snippet.thumbnails&&(c.snippet.thumbnails.default||c.snippet.thumbnails.medium);chAvatars[c.id]=t?t.url:'';});}catch(e){}}try{sessionStorage.setItem('avatars',JSON.stringify(chAvatars));}catch(e){}document.querySelectorAll('.cav[data-cid]').forEach(el=>{const u=chAvatars[el.dataset.cid];if(u){el.src=u;el.style.visibility='visible';}});}
async function loadHome(reset){if(reset){view={type:'home'};pageToken='';endReached=false;setNav('home');setListGrid(true);viewHeader.innerHTML='';list.innerHTML='';}if(endReached||loadingMore)return;loadingMore=true;show(loader);try{const d=await fetchCached(API+"/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=20&regionCode="+REGION+(pageToken?"&pageToken="+pageToken:"")+"&key="+API_KEY,600000);appendVideos(d.items);pageToken=d.nextPageToken||'';if(!pageToken)endReached=true;}catch(e){showErr(e);}loadingMore=false;hide(loader);}
async function runSearch(q,reset){if(reset){view={type:'search',q:q};pageToken='';endReached=false;setNav('');setListGrid(true);viewHeader.innerHTML='';list.innerHTML='';}if(endReached||loadingMore)return;loadingMore=true;show(loader);try{const d=await fetchCached(API+"/search?part=snippet&type=video&maxResults=20&q="+encodeURIComponent(view.q)+(pageToken?"&pageToken="+pageToken:"")+"&key="+API_KEY,300000);pageToken=d.nextPageToken||'';if(!pageToken)endReached=true;const ids=d.items.map(i=>i.id.videoId).filter(Boolean).join(",");if(ids){const d2=await fetchCached(API+"/videos?part=snippet,statistics,contentDetails&id="+ids+"&key="+API_KEY,300000);appendVideos(d2.items);}else if(reset)list.innerHTML='<div class="loader">Ничего не найдено</div>';}catch(e){showErr(e);}loadingMore=false;hide(loader);}
async function loadChannel(cid,title){view={type:'channel',cid:cid,title:title,auth:false,plId:null};setNav('');setListGrid(true);viewHeader.innerHTML='<div class="chhead">'+esc(title||'Канал')+'</div>';list.innerHTML='';window.scrollTo(0,0);show(loader);await renderChannelHeader(cid);hide(loader);pageToken='';endReached=false;if(view.plId)loadPlaylistPage(true);else list.innerHTML='<div class="loader">Не удалось загрузить канал</div>';}
async function renderChannelHeader(cid){try{const d=await fetchCached(API+"/channels?part=snippet,statistics,brandingSettings,contentDetails&id="+cid+"&key="+API_KEY,3600000);const c=d.items&&d.items[0];if(!c)return;view.plId=c.contentDetails.relatedPlaylists.uploads;const banner=c.brandingSettings&&c.brandingSettings.image&&c.brandingSettings.image.bannerExternalUrl;const av=c.snippet.thumbnails&&(c.snippet.thumbnails.medium||c.snippet.thumbnails.default);const subs=c.statistics&&c.statistics.subscriberCount?fmtViews(c.statistics.subscriberCount)+' подписчиков':'';viewHeader.innerHTML='<div>'+(banner?'<img class="chbanner" src="'+banner+'=w1200"/>':'')+'<div class="chpageinfo"><img class="chpageav" src="'+(av?av.url:'')+'"/><div><div class="chpagename">'+esc(c.snippet.title)+'</div><div class="chpagesub">'+subs+'</div></div></div></div>';}catch(e){}}
async function loadPlaylistPage(reset){if(reset){pageToken='';endReached=false;setListGrid(true);list.innerHTML='';if(view.type!=='channel')viewHeader.innerHTML=view.title?'<div class="chhead">'+esc(view.title)+'</div>':'';window.scrollTo(0,0);}if(endReached||loadingMore)return;loadingMore=true;show(loader);try{const url=API+"/playlistItems?part=contentDetails&maxResults=20&playlistId="+view.plId+(pageToken?"&pageToken="+pageToken:"")+(view.auth?"":"&key="+API_KEY);const d=view.auth?await fetchJson(url,auth()):await fetchCached(url,600000);pageToken=d.nextPageToken||'';if(!pageToken)endReached=true;const ids=d.items.map(i=>i.contentDetails.videoId).filter(Boolean).join(",");if(ids){const d2=await fetchCached(API+"/videos?part=snippet,statistics,contentDetails&id="+ids+"&key="+API_KEY,600000);appendVideos(d2.items);}else if(reset)list.innerHTML='<div class="loader">Пусто</div>';}catch(e){showErr(e);}loadingMore=false;hide(loader);}
function showSubs(){view={type:'subs'};setNav('subs');setListGrid(true);viewHeader.innerHTML='<div class="chhead">Подписки</div>';list.innerHTML='<div class="loader">Загрузка…</div>';withAuth(async()=>{try{const d=await fetchJson(API+"/subscriptions?part=snippet&mine=true&maxResults=50&order=alphabetical",auth());if(!d.items||!d.items.length){list.innerHTML='<div class="loader">Нет подписок</div>';return;}list.className='';list.innerHTML=d.items.map(s=>{const th=s.snippet.thumbnails&&(s.snippet.thumbnails.default||s.snippet.thumbnails.medium);const cid=s.snippet.resourceId.channelId;return '<div class="chrow" data-cid="'+cid+'" data-title="'+esc(s.snippet.title)+'"><img class="chav" src="'+(th?th.url:'')+'"/><div class="chname">'+esc(s.snippet.title)+'</div></div>';}).join('');}catch(e){showErr(e);}});}
function showLiked(){setNav('library');setListGrid(true);viewHeader.innerHTML='';list.innerHTML='<div class="loader">Загрузка…</div>';withAuth(async()=>{try{const d=await fetchJson(API+"/channels?part=contentDetails&mine=true",auth());const likes=d.items&&d.items[0]&&d.items[0].contentDetails.relatedPlaylists.likes;if(!likes){list.innerHTML='<div class="loader">Список недоступен</div>';return;}view={type:'playlist',plId:likes,auth:true,title:'Понравившиеся'};loadPlaylistPage(true);}catch(e){showErr(e);}});}
function showPlaylists(){setNav('library');setListGrid(true);viewHeader.innerHTML='<div class="chhead">Плейлисты</div>';list.innerHTML='<div class="loader">Загрузка…</div>';withAuth(async()=>{try{const d=await fetchJson(API+"/playlists?part=snippet,contentDetails&mine=true&maxResults=50",auth());view={type:'playlists'};if(!d.items||!d.items.length){list.innerHTML='<div class="loader">Плейлистов нет</div>';return;}list.innerHTML=d.items.map(p=>{const th=p.snippet.thumbnails&&(p.snippet.thumbnails.medium||p.snippet.thumbnails.default);return '<div class="card" data-pl="'+p.id+'" data-title="'+esc(p.snippet.title)+'"><div class="thumbwrap"><img class="thumb" src="'+(th?th.url:'')+'"/><span class="dur">'+(p.contentDetails.itemCount||0)+' видео</span></div><div class="info"><div><div class="title">'+esc(p.snippet.title)+'</div></div></div></div>';}).join('');}catch(e){showErr(e);}});}
function showLibrary(){view={type:'library'};setNav('library');viewHeader.innerHTML='';setListGrid(false);let h='<div class="libnav"><button class="libbtn" data-lib="liked">👍 Понравившиеся</button><button class="libbtn" data-lib="playlists">🗂 Плейлисты</button></div>';h+='<div class="libsec"><h3>Смотреть позже'+(watchLater.length?' ('+watchLater.length+')':'')+'</h3><div class="grid">'+(watchLater.length?watchLater.map(histCard).join(''):'<div class="loader">Пусто</div>')+'</div></div>';h+='<div class="libsec"><h3>История просмотров</h3><div class="grid">'+(history.length?history.map(histCard).join(''):'<div class="loader">Пусто</div>')+'</div></div>';list.innerHTML=h;fillAvatars();}
function openShorts(){view={type:'shorts'};setNav('shorts');setListGrid(false);viewHeader.innerHTML='';list.innerHTML='<div class="loader">⚡ Shorts-лента появится в следующем обновлении.</div>';}
list.addEventListener('click',e=>{const lb=e.target.closest('[data-lib]');if(lb){if(lb.dataset.lib==='liked')showLiked();else showPlaylists();return;}const pl=e.target.closest('[data-pl]');if(pl){view={type:'playlist',plId:pl.dataset.pl,auth:true,title:pl.dataset.title};loadPlaylistPage(true);return;}const ch=e.target.closest('.chrow');if(ch){loadChannel(ch.dataset.cid,ch.dataset.title);return;}const card=e.target.closest('.card');if(card)openVideo(card.dataset.id,card.dataset.title,card.dataset.channel,card.dataset.cid);});
relatedBox.addEventListener('click',e=>{const card=e.target.closest('.card');if(card)openVideo(card.dataset.id,card.dataset.title,card.dataset.channel,card.dataset.cid);});
window.addEventListener('scroll',()=>{if(watch.style.display==='flex'||settingsEl.style.display==='flex')return;if(window.innerHeight+window.scrollY>=document.body.offsetHeight-600)loadMore();});
function loadMore(){if(view.type==='home')loadHome(false);else if(view.type==='search')runSearch(view.q,false);else if(view.type==='channel'||view.type==='playlist')loadPlaylistPage(false);}
function openVideo(id,title,channel,cid){curId=id;document.getElementById('wtitle').textContent=title||'';const wch=document.getElementById('wchannel');wch.textContent=channel||'';wch.dataset.cid=cid||'';document.getElementById('wstats').textContent='';const de=document.getElementById('desc');de.textContent='';de.classList.remove('open');const dm=document.getElementById('descMore');dm.style.display='none';dm.textContent='…ещё';document.getElementById('commentsBox').innerHTML='';document.getElementById('loadComments').style.display='inline-block';sbnote.textContent='';const qs=document.getElementById('qualitySel');qs.dataset.filled='';qs.innerHTML='<option>Авто</option>';updateWLBtn(id);watch.classList.remove('mini');watch.style.display='flex';watch.scrollTop=0;updateBack();addHistory(id,title,channel,cid);segments=[];skipTarget=null;hideSkip();loadSegments(id);loadRelated(cid,id);loadDetails(id);startPlayer(id);}
function startPlayer(id){const s=()=>{if(!ytReady){setTimeout(s,200);return;}if(player)player.loadVideoById(id);else player=new YT.Player('player',{videoId:id,playerVars:{autoplay:1,playsinline:1,rel:0},events:{onReady:onReady,onStateChange:onState}});};s();}
function onReady(ev){ev.target.playVideo();ev.target.setPlaybackRate(curSpeed);maybeResume();}
function onState(e){if(e.data===1){if(!skipTimer)skipTimer=setInterval(loop,500);}else{if(skipTimer){clearInterval(skipTimer);skipTimer=null;}saveCurPos();}}
function loop(){skipCheck();tick++;if(tick%6===0)saveCurPos();if(tick%4===0)populateQuality();}
function saveCurPos(){if(player&&player.getCurrentTime&&curId){const t=player.getCurrentTime(),d=player.getDuration?player.getDuration():0;if(t>5&&(!d||t<d-8)){resume[curId]=Math.floor(t);saveResume();}else if(d&&t>=d-8){delete resume[curId];saveResume();}}}
function maybeResume(){const pos=resume[curId],r=document.getElementById('resume');if(pos&&pos>15){r.innerHTML='▶ Продолжить с '+fmtClock(pos)+' <span class="rx" id="rDismiss">✕</span>';r.style.display='block';r.onclick=(e)=>{r.style.display='none';if(e.target.id==='rDismiss')return;if(player)player.seekTo(pos,true);};setTimeout(()=>{r.style.display='none';},9000);}else r.style.display='none';}
function seekBy(n){if(player&&player.getCurrentTime)player.seekTo(Math.max(0,player.getCurrentTime()+n),true);}
function togglePlay(){if(!player)return;const st=player.getPlayerState?player.getPlayerState():-1;if(st===1)player.pauseVideo();else player.playVideo();}
function flashSeek(dir){const el=document.getElementById(dir<0?'flashL':'flashR');el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',450);}
function makeTap(el,dir){let last=0;el.addEventListener('click',()=>{const now=Date.now();if(now-last<300){seekBy(dir*10);flashSeek(dir);last=0;}else{last=now;setTimeout(()=>{if(last&&Date.now()-last>=300){togglePlay();last=0;}},310);}});}
makeTap(document.getElementById('tzLeft'),-1);makeTap(document.getElementById('tzRight'),1);
function populateQuality(){const sel=document.getElementById('qualitySel');if(!player||!player.getAvailableQualityLevels||sel.dataset.filled==='1')return;const lv=player.getAvailableQualityLevels();if(!lv||!lv.length)return;const nm={hd2160:'2160p',hd1440:'1440p',hd1080:'1080p',hd720:'720p',large:'480p',medium:'360p',small:'240p',tiny:'144p'};sel.innerHTML='<option value="default">Авто</option>'+lv.filter(x=>x!=='auto').map(l=>'<option value="'+l+'">'+(nm[l]||l)+'</option>').join('');sel.dataset.filled='1';}
document.getElementById('qualitySel').addEventListener('change',e=>{if(player&&player.setPlaybackQuality)player.setPlaybackQuality(e.target.value);});
const SPEEDS=[1,1.25,1.5,1.75,2,0.5,0.75];
document.getElementById('speedBtn').addEventListener('click',()=>{curSpeed=SPEEDS[(SPEEDS.indexOf(curSpeed)+1)%SPEEDS.length];if(player&&player.setPlaybackRate)player.setPlaybackRate(curSpeed);document.getElementById('speedBtn').textContent=curSpeed+'×';});
function updateWLBtn(id){const b=document.getElementById('wlBtn');if(inWL(id)){b.textContent='✓ В «Смотреть позже»';b.classList.add('on');}else{b.textContent='＋ Смотреть позже';b.classList.remove('on');}}
document.getElementById('wlBtn').addEventListener('click',()=>{toggleWL(curId,document.getElementById('wtitle').textContent,document.getElementById('wchannel').textContent,document.getElementById('wchannel').dataset.cid);updateWLBtn(curId);haptic();});
async function loadDetails(id){try{const d=await fetchCached(API+"/videos?part=snippet,statistics&id="+id+"&key="+API_KEY,600000);const v=d.items&&d.items[0];if(!v)return;const st=v.statistics||{},p=[];if(st.viewCount)p.push(fmtViews(st.viewCount)+' просмотров');if(v.snippet.publishedAt)p.push(fmtAgo(v.snippet.publishedAt));if(st.likeCount)p.push('👍 '+fmtViews(st.likeCount));document.getElementById('wstats').textContent=p.join(' • ');const desc=v.snippet.description||'',de=document.getElementById('desc');de.textContent=desc;document.getElementById('descMore').style.display=desc.length>180?'inline-block':'none';}catch(e){}}
document.getElementById('descMore').addEventListener('click',()=>{const de=document.getElementById('desc');de.classList.toggle('open');document.getElementById('descMore').textContent=de.classList.contains('open')?'Свернуть':'…ещё';});
document.getElementById('loadComments').addEventListener('click',()=>loadComments(curId));
async function loadComments(id){const box=document.getElementById('commentsBox'),btn=document.getElementById('loadComments');btn.style.display='none';box.innerHTML='<div class="cmutex">Загрузка комментариев…</div>';try{const d=await fetchCached(API+"/commentThreads?part=snippet&videoId="+id+"&maxResults=30&order=relevance&textFormat=plainText&key="+API_KEY,300000);if(!d.items||!d.items.length){box.innerHTML='<div class="cmutex">Комментариев нет</div>';return;}box.innerHTML='<div class="csecttl">Комментарии</div>'+d.items.map(t=>{const c=t.snippet.topLevelComment.snippet;return '<div class="cmt"><img class="cav2" src="'+(c.authorProfileImageUrl||'')+'"/><div><div class="cauth">'+esc(c.authorDisplayName)+'</div><div class="ctext">'+esc(c.textDisplay)+'</div><div class="clikes">👍 '+fmtViews(c.likeCount)+'</div></div></div>';}).join('');}catch(e){box.innerHTML='<div class="cmutex">Комментарии отключены для этого видео</div>';}}
async function loadRelated(cid,vid){relatedBox.innerHTML='';if(!cid)return;try{const d=await fetchCached(API+"/search?part=snippet&type=video&channelId="+cid+"&maxResults=10&order=date&key="+API_KEY,600000);const ids=d.items.map(i=>i.id.videoId).filter(x=>x&&x!==vid).join(",");if(!ids)return;const d2=await fetchCached(API+"/videos?part=snippet,statistics,contentDetails&id="+ids+"&key="+API_KEY,600000);relatedBox.innerHTML='<div class="relttl">Ещё с этого канала</div>'+d2.items.map(cardHtml).join('');fillAvatars();}catch(e){}}
function closeVideo(){saveCurPos();if(skipTimer){clearInterval(skipTimer);skipTimer=null;}if(player&&player.pauseVideo)player.pauseVideo();hideSkip();watch.classList.remove('mini');watch.style.display='none';updateBack();}
document.getElementById('back').addEventListener('click',closeVideo);
document.getElementById('miniBtn').addEventListener('click',()=>{watch.classList.add('mini');updateBack();});
document.getElementById('expandBtn').addEventListener('click',()=>{watch.classList.remove('mini');updateBack();});
document.getElementById('miniCloseBtn').addEventListener('click',closeVideo);
document.getElementById('wchannel').addEventListener('click',()=>{const cid=document.getElementById('wchannel').dataset.cid;if(cid){const t=document.getElementById('wchannel').textContent;closeVideo();loadChannel(cid,t);}});
function sbSettings(){try{return JSON.parse(localStorage.getItem('sbSettings'))||{};}catch(e){return {};}}
function getSb(){const s=sbSettings();return {mode:s.mode||'auto',cats:s.cats||SB_ALL.map(c=>c.id)};}
function saveSb(s){localStorage.setItem('sbSettings',JSON.stringify(s));}
async function loadSegments(id){segments=[];const cfg=getSb();if(!cfg.cats.length)return;try{const cats=encodeURIComponent(JSON.stringify(cfg.cats));const r=await fetch(SBAPI+"?videoID="+id+"&categories="+cats);if(!r.ok)return;const data=await r.json();segments=(data||[]).map(s=>({start:s.segment[0],end:s.segment[1],cat:s.category})).sort((a,b)=>a.start-b.start);}catch(e){}}
function skipCheck(){if(!player||!player.getCurrentTime||!segments.length)return;const t=player.getCurrentTime(),cfg=getSb();for(const s of segments){if(t>=s.start&&t<s.end-0.3){if(cfg.mode==='auto'){player.seekTo(s.end,true);flashNote(SB_NAMES[s.cat]||s.cat);hideSkip();}else showSkip(s);return;}}hideSkip();}
let noteT=null;function flashNote(m){sbnote.textContent='⏭ Пропущено: '+m;clearTimeout(noteT);noteT=setTimeout(()=>sbnote.textContent='',3000);}
function showSkip(s){skipTarget=s;skipBtn.style.display='block';}
function hideSkip(){skipTarget=null;skipBtn.style.display='none';}
skipBtn.addEventListener('click',()=>{if(skipTarget&&player){player.seekTo(skipTarget.end,true);hideSkip();}});
function renderCats(){const cfg=getSb();document.getElementById('modeSel').value=cfg.mode;document.getElementById('catList').innerHTML=SB_ALL.map(c=>'<div class="setrow"><span>'+c.name+'</span><input type="checkbox" data-cat="'+c.id+'" '+(cfg.cats.indexOf(c.id)>=0?'checked':'')+'/></div>').join('');}
document.getElementById('gear').addEventListener('click',()=>{renderCats();settingsEl.style.display='flex';updateBack();});
document.getElementById('setBack').addEventListener('click',closeSettings);
function closeSettings(){settingsEl.style.display='none';updateBack();}
document.getElementById('modeSel').addEventListener('change',e=>{const s=getSb();s.mode=e.target.value;saveSb(s);});
document.getElementById('catList').addEventListener('change',e=>{const cb=e.target.closest('[data-cat]');if(!cb)return;const s=getSb(),id=cb.dataset.cat;if(cb.checked){if(s.cats.indexOf(id)<0)s.cats.push(id);}else s.cats=s.cats.filter(x=>x!==id);saveSb(s);if(curId)loadSegments(curId);});
let sugT=null;
qInput.addEventListener('input',()=>{clearTimeout(sugT);sugT=setTimeout(()=>renderSuggest(qInput.value.trim()),200);});
qInput.addEventListener('focus',()=>renderSuggest(qInput.value.trim()));
function getHist(){try{return JSON.parse(localStorage.getItem('searchHist'))||[];}catch(e){return [];}}
function addHist(q){let h=getHist().filter(x=>x!==q);h.unshift(q);h=h.slice(0,15);localStorage.setItem('searchHist',JSON.stringify(h));}
function renderSuggest(q){const h=getHist().filter(x=>!q||x.toLowerCase().indexOf(q.toLowerCase())>=0);if(!h.length){suggest.style.display='none';return;}suggest.innerHTML=h.map(x=>'<div class="sugrow" data-q="'+esc(x)+'">🕘 '+esc(x)+'</div>').join('');suggest.style.display='block';}
suggest.addEventListener('click',e=>{const r=e.target.closest('[data-q]');if(r){qInput.value=r.dataset.q;doSearch(r.dataset.q);}});
document.addEventListener('click',e=>{if(!e.target.closest('header'))suggest.style.display='none';});
document.getElementById('searchForm').addEventListener('submit',e=>{e.preventDefault();const q=qInput.value.trim();if(q)doSearch(q);});
function doSearch(q){addHist(q);suggest.style.display='none';qInput.blur();runSearch(q,true);}
document.getElementById('tabbar').addEventListener('click',e=>{const b=e.target.closest('[data-nav]');if(!b)return;const n=b.dataset.nav;if(n==='home')loadHome(true);else if(n==='shorts')openShorts();else if(n==='subs')showSubs();else if(n==='library')showLibrary();});
let ptrStart=0,ptrPull=false;
window.addEventListener('touchstart',e=>{ptrPull=(window.scrollY<=0&&watch.style.display!=='flex'&&settingsEl.style.display!=='flex');ptrStart=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchmove',e=>{if(!ptrPull)return;const dy=e.touches[0].clientY-ptrStart;if(dy>0){ptr.style.height=Math.min(70,dy/2)+'px';ptr.style.opacity=Math.min(1,dy/140);}},{passive:true});
window.addEventListener('touchend',()=>{if(!ptrPull)return;const h=parseFloat(ptr.style.height)||0;ptr.style.height='0px';ptr.style.opacity='0';if(h>50)refreshCurrent();ptrPull=false;});
function refreshCurrent(){if(view.type==='search')runSearch(view.q,true);else if(view.type==='channel')loadChannel(view.cid,view.title);else if(view.type==='subs')showSubs();else if(view.type==='library')showLibrary();else if(view.type==='playlists')showPlaylists();else if(view.type==='playlist')loadPlaylistPage(true);else loadHome(true);}
function updateBack(){if(!tg||!tg.BackButton)return;const open=settingsEl.style.display==='flex'||(watch.style.display==='flex'&&!watch.classList.contains('mini'));if(open)tg.BackButton.show();else tg.BackButton.hide();}
if(tg&&tg.BackButton)tg.BackButton.onClick(globalBack);
function globalBack(){if(settingsEl.style.display==='flex')closeSettings();else if(watch.style.display==='flex')closeVideo();}
loadHome(true);
(function(){var btn=document.createElement('button');btn.id='noVpnBtn';btn.textContent='📥 Смотреть без VPN';btn.style.cssText='background:#0088cc;color:#fff;';var wc=document.querySelector('.wctrls');if(wc)wc.appendChild(btn);btn.addEventListener('click',function(){var link='https'+'://youtu.be/'+(curId||'');try{if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(link);}catch(e){}var s='https'+'://t.me/share/url?url='+encodeURIComponent(link);if(typeof tg!=='undefined'&&tg&&tg.openTelegramLink)tg.openTelegramLink(s);else window.open(s,'_blank');});})();
</script>
